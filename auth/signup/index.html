<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Bubble Paws</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/auth.css" />
  </head>
  <body>
    <section class="login-section signup">
      <div class="container">
        <div class="mx-auto login-card">
          <div class="logo text-center">
            <a class="navbar-brand" href="../../index.html">Bubble Paws</a>
          </div>
          <h3 class="text-center mb-2">Create Your Account</h3>
          <p class="text-center mb-4">Save your pet information and request grooming appointments faster.</p>
          <form>
            <div class="row">
              <div class="col-md-6">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" class="form-control" />
              </div>
            </div>

            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" required />

            <label for="petName" class="form-label">Pet Name</label>
            <input type="text" id="petName" class="form-control" />

            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required />

            <button type="submit" class="btn btn-primary w-100 mt-2">Create Account</button>
          </form>
          <hr />
          <p class="text-center mb-0">
            Already have an account?
            <a href="../login/index.html">Sign in</a>
          </p>
        </div>
      </div>
    </section>
  </body>
</html>
